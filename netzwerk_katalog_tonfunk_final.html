      <span class="rtag" id="rtag">Leser</span>
      <button class="hbtn" onclick="openSettings()">&#9881;</button>
      <button class="hbtn" onclick="logout()">&#9211;</button>
    </div>
  </div>
  <div class="mtabs">
    <button class="mt active da" id="mt-da" onclick="setMain('da')">&#128202; Dashboard</button>
    <button class="mt" id="mt-tf" onclick="setMain('tf')">&#127981; Tonfunk</button>
    <button class="mt" id="mt-hs" onclick="setMain('hs')">&#127760; Netzwerk</button>
    <button class="mt" id="mt-ac" onclick="setMain('ac')">&#128260; Aktivit&auml;ten</button>
    <button class="mt" id="mt-pb" onclick="setMain('pb')" style="display:none">&#128236; Posteingang</button>
  </div>
  <div class="stabs" id="stabs" style="display:none">
    <button class="st active" id="st-a" onclick="setSub('a')">&#128100; Kontakte</button>
    <button class="st" id="st-b" onclick="setSub('b')">&#128161; Themenspeicher</button>
  </div>
  <div class="layout" style="flex:1;overflow:hidden;display:flex">
    <div class="lc" id="lc"></div>
    <div class="dc" id="dc"></div>
  </div>
</div>
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mbox"></div>
</div>
<script>
const PIN='TF2025',JBB='https://api.jsonbin.io/v3/b/';
let ROLE='reader',MAIN='da',SUB='a',SEL=null;
let D={tfc:[],hsc:[],tft:[],hst:[],acts:[],pings:[],chron:[],inbox:[]};
let JBK='',JBI='',ST=null;
const TFA=['Applikationsentwicklung & Data Analytics','Arbeitsvorbereitung','Azubis','Produktion','Betriebsmittelbau','Buchhaltung','Controlling','Einkauf','Vertrieb','Instandhaltung','Geschaeftsfuehrung','IT-Administration','Konstruktion','Lager','Marketing','HR','Produktionsplanung','Projektmanagement','Prozesstechnik','Prueftechnik','Qualitaet','Versand'];
const TFS=['Aktiv','Ruhend'];
const HSI=['Hochschule Merseburg','Hochschule Anhalt','Hochschule Harz','OvGU Magdeburg','Fraunhofer','Berufsschule / BBS','Gymnasium','IHK','HWK','Wirtschaftsfoerderung','Land Sachsen-Anhalt','Bundesministerium','EU-Foerderstelle','Partnerunternehmen','Technologiepartner','Forschungsinstitut','Transferstelle','Medien','Sonstige'];
const HSR=['Professor/in','Transferbeauftragte/r','Praesidium / Leitung','Mitarbeiter/in','Ausbildungsleitung','Wirtschaftsfoerderung','Geschaeftsfuehrung','Projektleitung','Pressesprecher/in','Politiker/in','Sonstige'];
const HSS=['Offen','In Kontakt','Aktiv'];
const TTY=['Abschlussarbeit','Masterarbeit','Praxissemester','Praktikum','Werkstudent','Forschungsprojekt','Kooperation','Weiterbildung','Idee','Sonstige'];
const TST=['Idee','Offen','In Bearbeitung','Vereinbart','Abgeschlossen'];
const ATY=['Hochschulbesuch','Kooperation','Abschlussarbeit','Praxissemester','Forschungsprojekt','Foerderantrag','Veranstaltung','Weiterbildung','Klaerungsgespraech','Sonstige'];
const AST=['Geplant','Laufend','Abgeschlossen'];
const PR=['Hoch','Mittel','Niedrig'];
const FCH=['Elektrotechnik','Automatisierungstechnik','Mechatronik','Informatik','Wirtschaftsingenieurwesen','Maschinenbau','Produktionstechnik','Nachhaltigkeit','Sonstige'];
const HTY=['Praxispartner gesucht','Abschlussarbeiten vergeben','Forschungspartner gesucht','Lehrkooperation','Foerderantrag'];
const BC={Aktiv:'b-gn','In Kontakt':'b-bl',Laufend:'b-gn',Offen:'b-am',Geplant:'b-bl','In Bearbeitung':'b-bl',Vereinbart:'b-gn',Abgeschlossen:'b-gr',Idee:'b-gr',Ruhend:'b-gr'};
function bdg(v){return'<span class="badge '+(BC[v]||'b-gr')+'">'+e(v)+'</span>'}
function bP(v){return'<span class="badge '+({Hoch:'b-rd',Mittel:'b-am',Niedrig:'b-gr'}[v]||'b-gr')+'">'+e(v)+'</span>'}
function bT(v){return'<span class="badge b-tl">'+e(v)+'</span>'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function so(arr,cur,bl){return(bl?'<option value="">'+e(bl)+'</option>':'')+arr.map(o=>'<option'+(cur===o?' selected':'')+'>'+e(o)+'</option>').join('')}
function today(){return new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}
function isEd(){return ROLE==='editor'}
function tfC(id){return D.tfc.find(c=>c.id===id)}
function hsC(id){return D.hsc.find(c=>c.id===id)}
function cN(id){const c=tfC(id)||hsC(id);return c?c.name:'--'}
function gT(id){return D.tft.find(t=>t.id===id)||D.hst.find(t=>t.id===id)}
function gPings(t,i){return(D.pings||[]).filter(p=>p.et===t&&p.ei===i)}
function gChron(aid){return(D.chron||[]).filter(c=>c.aid===aid).sort((a,b)=>b.dt.localeCompare(a.dt))}
function wvCls(d){if(!d)return'wv-n';const diff=Math.round((new Date(d)-new Date().setHours(0,0,0,0))/86400000);if(diff<0)return'wv-r';if(diff<=7)return'wv-a';return'wv-g'}
function wvLbl(d){if(!d)return'--';const diff=Math.round((new Date(d)-new Date().setHours(0,0,0,0))/86400000);const fmt=new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});if(diff<0)return'&#9940; '+fmt+' ('+Math.abs(diff)+'d)';if(diff===0)return'&#128308; Heute';if(diff<=7)return'&#128993; '+fmt+' (in '+diff+'d)';return'&#128994; '+fmt}
function mScore(t,c){let s=0;const tf=((t.tit||'')+(t.desc||'')+(t.fach||'')).toLowerCase();const cf=((c.fb||'')+(c.notiz||'')+(c.inst||'')).toLowerCase();tf.split(/\s+/).filter(w=>w.length>4).forEach(w=>{if(cf.includes(w))s++});if(t.fach&&cf.includes(t.fach.toLowerCase()))s+=3;return Math.min(s,10)}
function getMatches(t){return D.hsc.map(c=>({c,s:mScore(t,c)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,5)}
function tryPin(){document.getElementById('pin-in').value===PIN?startAs('editor'):(document.getElementById('pin-err').textContent='PIN ungueltig.')}
function startAs(r){
  ROLE=r;sessionStorage.setItem('tf_role',r);
  document.getElementById('ps').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('rtag').textContent=r==='editor'?'Redakteur':'Leser';
  document.getElementById('rtag').className='rtag '+(r==='editor'?'r-ed':'r-rd');
  if(r==='editor'){const pb=document.getElementById('mt-pb');if(pb)pb.style.display='flex'}
  if(r==='reader'){const rb=document.getElementById('reader-btns');if(rb){rb.style.display='flex';rb.style.flexDirection='row'}}
  JBK=localStorage.getItem('jbk')||'';JBI=localStorage.getItem('jbi')||'';
  loadL();syncLoad().then(()=>render());
}
function logout(){sessionStorage.removeItem('tf_role');location.reload()}
function loadL(){try{const r=localStorage.getItem('tfnw9');if(r){const p=JSON.parse(r);['tfc','hsc','tft','hst','acts','pings','chron','inbox'].forEach(k=>{D[k]=p[k]||[]})}}catch(x){}}
function saveL(){try{localStorage.setItem('tfnw9',JSON.stringify(D))}catch(x){}}
function sched(){saveL();clearTimeout(ST);ST=setTimeout(syncSave,1800)}
function setSS(s,l){document.getElementById('sdot').className='sdot '+(s==='ok'?'ok':s==='warn'?'warn':s==='err'?'err':'');document.getElementById('slbl').textContent=l}
async function syncLoad(){if(!JBK||!JBI){setSS('','lokal');return}setSS('warn','laden...');try{const r=await fetch(JBB+JBI+'/latest',{headers:{'X-Master-Key':JBK}});if(!r.ok)throw 0;const j=await r.json();if(j.record){['tfc','hsc','tft','hst','acts','pings','chron','inbox'].forEach(k=>{D[k]=(j.record[k]||[])});saveL()}setSS('ok','JSONbin OK')}catch(x){setSS('err','Sync-Fehler')}}
async function syncSave(){saveL();if(!JBK||!JBI)return;setSS('warn','speichert...');try{await fetch(JBB+JBI,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBK},body:JSON.stringify(D)});setSS('ok','gespeichert')}catch(x){setSS('err','Sync-Fehler')}}
function setMain(m){
  MAIN=m;SEL=null;
  ['da','tf','hs','ac','pb'].forEach(k=>{const b=document.getElementById('mt-'+k);if(b)b.classList.remove('active','hs','act','da','pb')});
  const cls={da:'da',tf:'',hs:'hs',ac:'act',pb:'pb'};
  const b=document.getElementById('mt-'+m);if(b)b.classList.add('active',...(cls[m]?[cls[m]]:[]));
  document.getElementById('stabs').style.display=(m==='tf'||m==='hs')?'flex':'none';
  const rb=document.getElementById('reader-btns');if(rb)rb.style.display=(ROLE==='reader'&&m!=='pb')?'flex':'none';
  document.getElementById('dc').classList.remove('show');
  if(m==='tf'||m==='hs')setSub('a',false);
  render();
}
function setSub(s,doR=true){
  SUB=s;SEL=null;
  ['a','b'].forEach(k=>{const el=document.getElementById('st-'+k);if(el){el.classList.remove('active','hs');el.classList.toggle('active',k===s)}});
  if(MAIN==='hs'){['a','b'].forEach(k=>{const el=document.getElementById('st-'+k);if(el)el.classList.add('hs')})}
  document.getElementById('dc').classList.remove('show');
  if(doR)render();
}
function getVK(){if(MAIN==='tf')return SUB==='a'?'tc':'tt';if(MAIN==='hs')return SUB==='a'?'hc':'ht';return MAIN}
function getSF(){return{s:(document.getElementById('sf-s')||{}).value?.toLowerCase()||'',k:(document.getElementById('sf-k')||{}).value||'',st:(document.getElementById('sf-st')||{}).value||''}}
function gsrSearch(q){
  const r=document.getElementById('gsr-res');
  if(!q||q.length<2){r.classList.remove('show');return}
  const ql=q.toLowerCase();const hits=[];
  D.tfc.forEach(c=>{if(Object.values(c).join(' ').toLowerCase().includes(ql))hits.push({ty:'tc',ico:'&#128100;',n:c.name,s:c.funk||c.abt,id:c.id})});
  D.hsc.forEach(c=>{if(Object.values(c).join(' ').toLowerCase().includes(ql))hits.push({ty:'hc',ico:'&#127760;',n:c.name,s:c.inst,id:c.id})});
  D.tft.forEach(t=>{if(Object.values(t).join(' ').toLowerCase().includes(ql))hits.push({ty:'tt',ico:'&#128161;',n:t.tit,s:t.typ,id:t.id})});
  D.acts.forEach(a=>{if(Object.values(a).join(' ').toLowerCase().includes(ql))hits.push({ty:'ac',ico:'&#128260;',n:a.tit,s:a.typ,id:a.id})});
  if(!hits.length){r.innerHTML='<div style="padding:14px 12px;font-size:13px;color:var(--tx3);text-align:center">Keine Treffer</div>';r.classList.add('show');return}
  const grp={tc:'Tonfunk-Kontakte',hc:'Netzwerk-Kontakte',tt:'Themen Tonfunk',ac:'Aktivitaeten'};
  let html='';
  Object.keys(grp).forEach(t=>{const g=hits.filter(h=>h.ty===t);if(!g.length)return;html+='<div class="gsr-grp">'+grp[t]+'</div>';g.slice(0,4).forEach(h=>{html+='<div class="gsr-row" onclick="gsrGo(\''+h.ty+'\',\''+h.id+'\')"><span style="font-size:15px">'+h.ico+'</span><div><div class="gsr-nm">'+e(h.n)+'</div><div class="gsr-sb">'+e(h.s||'')+'</div></div></div>'})});
  r.innerHTML=html;r.classList.add('show');
}
function gsrGo(ty,id){hideGSR();document.getElementById('gsr-in').value='';if(ty==='tc'){setMain('tf');setSub('a',false)}else if(ty==='hc'){setMain('hs');setSub('a',false)}else if(ty==='tt'){setMain('tf');setSub('b',false)}else{setMain('ac')}SEL=id;render();setTimeout(()=>selItem(ty,id),50)}
function showGSR(){document.getElementById('gsr-res').classList.add('show')}
function hideGSR(){document.getElementById('gsr-res').classList.remove('show')}
function render(){
  const vk=getVK(),lc=document.getElementById('lc');
  if(MAIN==='da')lc.innerHTML=renderDash();
  else if(vk==='tc')lc.innerHTML=renderTfC();
  else if(vk==='hc')lc.innerHTML=renderHsC();
  else if(vk==='tt')lc.innerHTML=renderTfT();
  else if(vk==='ht')lc.innerHTML=renderHsT();
  else if(vk==='ac')lc.innerHTML=renderAct();
  else if(MAIN==='pb')lc.innerHTML=renderInbox();
  const pb=document.getElementById('mt-pb');
  if(pb&&isEd()){const cnt=(D.inbox||[]).length;pb.innerHTML='&#128236; Posteingang'+(cnt>0?' <span class="inbox-badge">'+cnt+'</span>':'')}
}
function renderDash(){
  const now=new Date();now.setHours(0,0,0,0);
  const ov=D.acts.filter(a=>a.wv&&a.status!=='Abgeschlossen'&&new Date(a.wv)<now);
  const ds=D.acts.filter(a=>{if(!a.wv||a.status==='Abgeschlossen')return false;const d=Math.round((new Date(a.wv)-now)/86400000);return d>=0&&d<=7});
  const noC=D.tft.filter(t=>!(t.tids||[]).length);
  const inbox=(D.inbox||[]).length;
  return '<div class="d-kpi">'
    +'<div class="kpi" onclick="setMain(\'tf\');setSub(\'a\')"><div class="kpi-v" style="color:var(--bl)">'+(D.tfc.length+D.hsc.length)+'</div><div class="kpi-l">Kontakte gesamt</div></div>'
    +'<div class="kpi" onclick="setMain(\'ac\')"><div class="kpi-v" style="color:var(--tl)">'+D.acts.filter(a=>a.status!=='Abgeschlossen').length+'</div><div class="kpi-l">Aktive Aktivitaeten</div></div>'
    +'<div class="kpi" onclick="setMain(\'tf\');setSub(\'b\')"><div class="kpi-v" style="color:var(--pu)">'+(D.tft.length+D.hst.length)+'</div><div class="kpi-l">Themen gesamt</div></div>'
    +(isEd()?'<div class="kpi" onclick="setMain(\'pb\')" style="'+(inbox>0?'border-color:var(--rd)':'')+'"><div class="kpi-v" style="color:'+(inbox>0?'var(--rd)':'var(--am)')+'">'+inbox+'</div><div class="kpi-l">&#128236; Posteingang</div></div>':'<div class="kpi"><div class="kpi-v" style="color:var(--am)">'+(D.pings||[]).length+'</div><div class="kpi-l">Pings</div></div>')
    +'</div><div class="d-grid">'
    +'<div class="d-card"><div class="d-ct">&#9940; Ueberfaellige Wiedervorlagen ('+ov.length+')</div>'+(ov.length?ov.map(a=>'<div class="d-row" onclick="setMain(\'ac\');selItem(\'ac\',\''+a.id+'\')"><div class="d-dot" style="background:var(--rd)"></div><div><div class="d-t">'+e(a.tit)+'</div><div class="d-s">'+wvLbl(a.wv)+'</div></div></div>').join(''):'<div class="dp-em">Keine ueberfaelligen Eintraege &#127881;</div>')+'</div>'
    +'<div class="d-card"><div class="d-ct">&#128993; Faellig in 7 Tagen ('+ds.length+')</div>'+(ds.length?ds.map(a=>'<div class="d-row" onclick="setMain(\'ac\');selItem(\'ac\',\''+a.id+'\')"><div class="d-dot" style="background:var(--am)"></div><div><div class="d-t">'+e(a.tit)+'</div><div class="d-s">'+wvLbl(a.wv)+'</div></div></div>').join(''):'<div class="dp-em">Nichts faellig in 7 Tagen</div>')+'</div>'
    +'<div class="d-card"><div class="d-ct">&#9888; Themen ohne Ansprechpartner ('+noC.length+')</div>'+(noC.length?noC.map(t=>'<div class="d-row" onclick="setMain(\'tf\');setSub(\'b\',false);render();selItem(\'tt\',\''+t.id+'\')"><div class="d-dot" style="background:var(--rd)"></div><div><div class="d-t">'+e(t.tit)+'</div><div class="d-s">'+e(t.typ)+'</div></div></div>').join(''):'<div class="dp-em">Alle Themen haben Ansprechpartner &#10003;</div>')+'</div>'
    +'<div class="d-card"><div class="d-ct">&#128260; Aktuelle Aktivitaeten</div>'+D.acts.filter(a=>a.status!=='Abgeschlossen').slice(0,5).map(a=>'<div class="d-row" onclick="setMain(\'ac\');selItem(\'ac\',\''+a.id+'\')"><div class="d-dot" style="background:'+(a.status==='Laufend'?'var(--gn)':'var(--bl)')+'"></div><div><div class="d-t">'+e(a.tit)+'</div><div class="d-s">'+e(a.ns||a.zeit||'')+'</div></div></div>').join('')+(D.acts.filter(a=>a.status!=='Abgeschlossen').length===0?'<div class="dp-em">Keine aktiven Aktivitaeten</div>':'')+'</div>'
    +'<div class="d-card"><div class="d-ct">&#128204; Neueste Pings ('+(D.pings||[]).length+')</div>'+[...(D.pings||[])].reverse().slice(0,5).map(p=>'<div class="d-row"><div class="d-dot" style="background:var(--am)"></div><div><div class="d-t">'+e(p.name)+': '+e((p.text||'').substring(0,50))+((p.text||'').length>50?'...':'')+'</div><div class="d-s">'+e(p.datum)+'</div></div></div>').join('')+((D.pings||[]).length===0?'<div class="dp-em">Keine Pings</div>':'')+'</div>'
    +'</div>';
}
const AVB=['#e0e7ff','#fce7f3','#dcfce7','#fef9c3','#ede9fe','#cffafe','#fee2e2'];
const AVC=['#4338ca','#be185d','#15803d','#a16207','#7c3aed','#0e7490','#dc2626'];
function cardActions(ty,id,editFn){return'<div class="c-act" onclick="event.stopPropagation()">'+(isEd()?'<button class="btn b-sm" onclick="'+editFn+'(\''+id+'\')">&#9998;</button><button class="btn b-sm b-d" onclick="delI(\''+ty+'\',\''+id+'\')">&#215;</button>':'')+(ty==='tfc'||ty==='hsc'?'<button class="btn b-sm" style="color:var(--tl)" onclick="event.stopPropagation();expVCard(\''+id+'\')" title="vCard">&#128199;</button>':'')+'<button class="btn b-sm" style="color:var(--am)" onclick="openPing(\''+ty.slice(0,2)+'\',\''+id+'\')">&#128204;</button></div>'}
function renderTfC(){
  const {s,k,st}=getSF();
  const rows=D.tfc.filter(r=>{if(s&&!Object.values(r).join(' ').toLowerCase().includes(s))return false;if(k&&r.abt!==k)return false;if(st&&r.status!==st)return false;return true});
  return'<div class="stats"><div class="sc"><div class="sc-l">Gesamt</div><div class="sc-v">'+D.tfc.length+'</div></div><div class="sc"><div class="sc-l">Aktiv</div><div class="sc-v">'+D.tfc.filter(c=>c.status==='Aktiv').length+'</div></div><div class="sc"><div class="sc-l">Gefiltert</div><div class="sc-v">'+rows.length+'</div></div></div>'
    +'<div class="tb"><div class="sb"><span class="sb-i">&#128269;</span><input id="sf-s" placeholder="Suchen..." oninput="render()" value="'+e(getSF().s)+'"></div>'
    +'<select class="fil" id="sf-k" onchange="render()"><option value="">Alle Abteilungen</option>'+TFA.map(a=>'<option'+(getSF().k===a?' selected':'')+'>'+a+'</option>').join('')+'</select>'
    +'<select class="fil" id="sf-st" onchange="render()"><option value="">Alle Status</option>'+TFS.map(a=>'<option'+(getSF().st===a?' selected':'')+'>'+a+'</option>').join('')+'</select>'
    +'<div class="mla">'+(isEd()?'<button class="btn" onclick="openImp()" title="Import">&#128229;</button>':'')+'<button class="btn" onclick="expCSV(\'tf\')" title="CSV">&#128228;</button>'+(isEd()?'<button class="btn b-p" onclick="openTfCF(null)">+ Kontakt</button>':'')+'</div></div>'
    +(rows.length?'<div class="card-list">'+rows.map((r,i)=>'<div class="card'+(SEL===r.id?' sel':'')+'" onclick="selItem(\'tc\',\''+r.id+'\')">'
      +'<div class="c-head"><div class="av" style="background:'+AVB[i%7]+';color:'+AVC[i%7]+'">'+e((r.name||'?')[0])+'</div>'
      +'<div style="flex:1;min-width:0"><div class="c-t">'+e(r.name)+'</div><div class="c-s">'+e(r.funk||'')+(r.abt?' &middot; '+e(r.abt):'')+'</div></div>'
      +'<div class="c-act" onclick="event.stopPropagation()">'+(isEd()?'<button class="btn b-sm" onclick="openTfCF(\''+r.id+'\')">&#9998;</button><button class="btn b-sm b-d" onclick="delI(\'tfc\',\''+r.id+'\')">&#215;</button>':'')
      +'<button class="btn b-sm" style="color:var(--tl)" onclick="event.stopPropagation();expVCard(\''+r.id+'\')" title="vCard">&#128199;</button>'
      +'<button class="btn b-sm" style="color:var(--am)" onclick="openPing(\'tc\',\''+r.id+'\')">&#128204;</button></div></div>'
      +'<div class="c-foot">'+bdg(r.status)+(r.email?'<a class="btn b-sm b-g" href="mailto:'+e(r.email)+'" onclick="event.stopPropagation()">&#128231; '+e(r.email)+'</a>':'')+(r.tel?'<a class="btn b-sm b-g" href="tel:'+e(r.tel.replace(/\s/g,''))+'" onclick="event.stopPropagation()">&#128222; '+e(r.tel)+'</a>':'')+(gPings('tc',r.id).length?'<span class="badge b-am">&#128204; '+gPings('tc',r.id).length+'</span>':'')+'</div></div>').join('')+'</div>'
      :'<div class="es"><div class="es-i">&#128100;</div><div class="es-t">Noch keine Kontakte</div><div style="font-size:13px;color:var(--tx3)">Ersten Kontakt anlegen</div></div>');
}
function renderHsC(){
  const {s,k,st}=getSF();

function selItem(ty,id){
  SEL=id;document.getElementById('dc').classList.add('show');
  if(ty==='tc')dTfC(id);else if(ty==='hc')dHsC(id);
  else if(ty==='tt')dTfT(id);else if(ty==='ht')dHsT(id);
  else if(ty==='ac')dAct(id);
  if(ty==='tc'&&(MAIN!=='tf'||SUB!=='a')){setMain('tf');setSub('a',false)}
  if(ty==='hc'&&(MAIN!=='hs'||SUB!=='a')){setMain('hs');setSub('a',false)}
  if(ty==='tt'&&(MAIN!=='tf'||SUB!=='b')){setMain('tf');setSub('b',false)}
  if(ty==='ht'&&(MAIN!=='hs'||SUB!=='b')){setMain('hs');setSub('b',false)}
  if(ty==='ac'&&MAIN!=='ac')setMain('ac');
  render();
}

function prevImp(){const file=document.getElementById('imp-f').files[0];if(!file)return;const rd=new FileReader();rd.onload=ev=>{const txt=ev.target.result;const tgt=document.getElementById('imp-t').value;const parsed=file.name.toLowerCase().endsWith('.vcf')?parseVCF(txt):parseCSV(txt,tgt);const prev=document.getElementById('imp-prev');if(!parsed.length){prev.innerHTML='<div style="color:var(--rd);font-size:12px">Keine Kontakte erkannt.</div>';return}prev.innerHTML='<div style="background:var(--gn-l);border:1px solid var(--gn-m);border-radius:var(--r8);padding:9px 13px;font-size:12px;color:var(--gn);font-weight:600">&#10003; '+parsed.length+' Kontakt(e) erkannt</div><div style="margin-top:7px;max-height:140px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r8)">'+parsed.map(c=>'<div style="padding:6px 11px;border-bottom:1px solid var(--bd);font-size:12px"><strong>'+e(c.name||'--')+'</strong><span style="color:var(--tx3);margin-left:8px">'+e(c.email||c.inst||c.abt||'')+'</span></div>').join('')+'</div>';prev.dataset.parsed=JSON.stringify(parsed)};rd.readAsText(file,'UTF-8')}
function parseVCF(txt){return txt.split(/BEGIN:VCARD/i).slice(1).map(card=>{const g=k=>{const m=card.match(new RegExp(k+'[^:]*:([^\r\n]+)','i'));return m?m[1].trim():''};return{name:g('FN')||g('N').replace(/;+/g,' ').trim(),funk:g('TITLE'),abt:'',inst:g('ORG').replace(/;/g,' ').trim(),fb:'',email:g('EMAIL'),tel:g('TEL'),adr:g('ADR').replace(/;/g,', ').replace(/^,+|,+$/g,'').trim(),notiz:g('NOTE').replace(/\\n/g,'\n'),status:'Offen',rolle:'Sonstige',dok:[]}}).filter(c=>c.name)}
function parseCSV(txt,tgt){return txt.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith('"Name"')&&!l.startsWith('Name')).map(line=>{const c=line.split(';').map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"').trim());return tgt==='tf'?{name:c[0]||'',funk:c[1]||'',abt:c[2]||'',email:c[3]||'',tel:c[4]||'',status:c[5]||'Offen',notiz:c[6]||'',dok:[]}:{name:c[0]||'',rolle:c[1]||'Sonstige',inst:c[2]||'',fb:c[3]||'',email:c[4]||'',tel:c[5]||'',adr:c[6]||'',status:c[7]||'Offen',notiz:c[8]||'',dok:[]}}).filter(c=>c.name)}

function rejectInbox(id){if(!confirm('Eintrag ablehnen und entfernen?'))return;D.inbox=D.inbox.filter(x=>x.id!==id);sched();render()}
function openSettings(){openModal('<div class="m-hdr"><div class="m-t">&#9881; Einstellungen</div><button class="m-cl" onclick="closeModal()">&#10005;</button></div><div class="m-body"><p style="font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.5">JSONbin.io verbinden fuer geteilten Datenstand.</p><div class="sr"><label>Master-Key</label><input id="st-k" type="password" value="'+JBK+'" placeholder="$2a$10$..."></div><div class="sr"><label>Bin-ID</label><input id="st-i" value="'+JBI+'" placeholder="6..."></div><div id="st-msg" style="min-height:18px"></div><div class="sdiv"></div><p style="font-size:12px;color:var(--tx3)">Redakteur-PIN: <strong>TF2025</strong></p></div><div class="m-foot"><button class="btn" onclick="testJB()">Verbindung testen</button><button class="btn" onclick="closeModal()">Schliessen</button><button class="btn b-p" onclick="saveSet()">Speichern & Sync</button></div>')}
async function testJB(){const k=document.getElementById('st-k').value.trim();const i=document.getElementById('st-i').value.trim();if(!k||!i){document.getElementById('st-msg').innerHTML='<div class="s-err">Beide Felder ausfuellen.</div>';return}document.getElementById('st-msg').textContent='Testen...';try{const r=await fetch(JBB+i+'/latest',{headers:{'X-Master-Key':k}});document.getElementById('st-msg').innerHTML=r.ok?'<div class="s-ok">&#10003; Verbindung erfolgreich</div>':'<div class="s-err">&#10005; Fehler</div>'}catch(x){document.getElementById('st-msg').innerHTML='<div class="s-err">&#10005; Netzwerkfehler</div>'}}
async function saveSet(){JBK=document.getElementById('st-k').value.trim();JBI=document.getElementById('st-i').value.trim();localStorage.setItem('jbk',JBK);localStorage.setItem('jbi',JBI);closeModal();await syncLoad();render()}
if(sessionStorage.getItem('tf_role'))startAs(sessionStorage.getItem('tf_role'));
</script>
