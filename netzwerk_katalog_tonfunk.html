<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonfunk Netzwerk-Katalog</title>
<style>
:root{
  --bg:#f7f8fa;--sf:#fff;--s2:#f0f2f5;--s3:#e8eaed;
  --bd:#e2e5e9;--bd2:#d0d4da;--tx:#0f1117;--tx2:#4a5568;--tx3:#8b95a1;
  --bl:#3b6ef6;--bl-l:#eef2fe;--bl-m:#c7d3fc;
  --gn:#16a34a;--gn-l:#f0fdf4;--gn-m:#bbf7d0;
  --am:#d97706;--am-l:#fffbeb;--am-m:#fde68a;
  --rd:#dc2626;--rd-l:#fef2f2;--rd-m:#fecaca;
  --pu:#7c3aed;--pu-l:#f5f3ff;--pu-m:#ddd6fe;
  --tl:#0891b2;--tl-l:#ecfeff;--tl-m:#a5f3fc;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px;
  --sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 12px rgba(0,0,0,.08);--sh3:0 12px 32px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
/* PIN */
#ps{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
.pw{background:var(--sf);border-radius:var(--r24);padding:40px;width:370px;box-shadow:var(--sh3);text-align:center}
.pw-logo{font-size:26px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#3b6ef6,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pw-sub{font-size:13px;color:var(--tx3);margin-bottom:26px}
.pw-in{width:100%;padding:13px;text-align:center;font-size:22px;letter-spacing:8px;border:2px solid var(--bd);border-radius:var(--r12);font-family:monospace;outline:none;transition:border-color .15s}
.pw-in:focus{border-color:var(--bl)}
.pw-err{min-height:16px;font-size:12px;color:var(--rd);margin:7px 0}
.pw-btn{width:100%;padding:12px;border-radius:var(--r12);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:6px}
.pw-p{background:linear-gradient(135deg,#3b6ef6,#7c3aed);color:#fff}.pw-p:hover{opacity:.88}
.pw-s{background:var(--s2);color:var(--tx2);margin-top:8px}.pw-s:hover{background:var(--s3)}
/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden;flex-direction:column}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:var(--sh)}
.hdr-br{font-size:15px;font-weight:800;background:linear-gradient(135deg,#3b6ef6,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-sp{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.hdr-loc{font-size:12px;color:var(--tx3);white-space:nowrap}
/* GLOBAL SEARCH */
.gsr{position:relative;flex:1;max-width:310px;min-width:110px}
.gsr input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:var(--r8);background:var(--s2);font-size:13px;color:var(--tx);outline:none;transition:all .15s}
.gsr input:focus{background:var(--sf);border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,110,246,.1)}
.gsr-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tx3);pointer-events:none}
.gsr-res{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);box-shadow:var(--sh3);z-index:300;max-height:340px;overflow-y:auto;display:none}
.gsr-res.show{display:block}
.gsr-grp{padding:7px 11px 3px;font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--bd)}
.gsr-grp:first-child{border-top:none}
.gsr-row{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer}
.gsr-row:hover{background:var(--s2)}
.gsr-nm{font-size:13px;font-weight:600}.gsr-sb{font-size:11px;color:var(--tx3)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.rtag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.r-ed{background:var(--gn-l);color:var(--gn)}.r-rd{background:var(--s2);color:var(--tx3)}
.sdrow{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--bd2)}
.sdot.ok{background:var(--gn)}.sdot.warn{background:var(--am)}.sdot.err{background:var(--rd)}
.hbtn{width:32px;height:32px;border-radius:var(--r8);border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2);transition:all .15s}
.hbtn:hover{background:var(--s2)}
/* MAIN TABS */
.mtabs{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;display:flex;gap:2px;flex-shrink:0}
.mt{padding:0 13px;height:44px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.mt:hover{color:var(--tx)}.mt.active{color:var(--bl);border-bottom-color:var(--bl)}
.mt.active.hs{color:var(--pu);border-bottom-color:var(--pu)}
.mt.active.act{color:var(--tl);border-bottom-color:var(--tl)}
.mt.active.da{color:var(--am);border-bottom-color:var(--am)}
/* SUB TABS */
.stabs{background:linear-gradient(180deg,var(--sf),var(--bg));border-bottom:1px solid var(--bd);padding:0 16px;display:flex;gap:4px;flex-shrink:0}
.st{padding:0 13px;height:37px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--tx3);border-radius:var(--r8) var(--r8) 0 0;margin-top:4px;transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.st:hover{color:var(--tx);background:var(--s2)}
.st.active{background:var(--sf);color:var(--bl);border:1px solid var(--bd);border-bottom:1px solid var(--sf);box-shadow:var(--sh)}
.st.active.hs{color:var(--pu)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
.lc{flex:1;overflow-y:auto;padding:14px 16px;min-width:0}
.dc{width:400px;flex-shrink:0;background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;display:none}
.dc.show{display:block}
/* TOOLBAR */
.tb{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.sb{position:relative;flex:1;min-width:130px;max-width:210px}
.sb input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:var(--r8);background:var(--sf);font-size:13px;color:var(--tx);outline:none}
.sb input:focus{border-color:var(--bl)}
.sb-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tx3);pointer-events:none}
.fil{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r8);background:var(--sf);font-size:12px;color:var(--tx2);outline:none;cursor:pointer;font-weight:500;max-width:150px}
.mla{margin-left:auto;display:flex;gap:6px;align-items:center}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:13px;font-weight:600;border-radius:var(--r8);border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap;line-height:1}
.btn:hover{background:var(--s2);border-color:var(--bd2)}
.b-p{background:var(--bl);color:#fff;border-color:var(--bl)}.b-p:hover{background:#2a5ce5}
.b-p.hs{background:var(--pu);border-color:var(--pu)}.b-p.hs:hover{background:#6b30d1}
.b-p.act{background:var(--tl);border-color:var(--tl)}.b-p.act:hover{background:#0771a0}
.b-sm{padding:5px 9px;font-size:12px}
.b-g{border-color:transparent;background:transparent}.b-g:hover{background:var(--s2)}
.b-d{color:var(--rd);border-color:transparent;background:transparent}.b-d:hover{background:var(--rd-l)}
.b-pro{color:var(--gn);border-color:var(--gn-m);background:var(--gn-l)}.b-pro:hover{background:#dcfce7}
/* STATS */
.stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);padding:11px 14px;min-width:84px;box-shadow:var(--sh)}
.sc-l{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sc-v{font-size:22px;font-weight:800;letter-spacing:-.5px}
/* DASHBOARD */
.d-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);padding:14px;text-align:center;box-shadow:var(--sh)}
.kpi-v{font-size:28px;font-weight:800;letter-spacing:-1px}.kpi-l{font-size:11px;color:var(--tx2);font-weight:600;margin-top:3px}
.d-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.d-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r16);padding:16px;box-shadow:var(--sh)}
.d-ct{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px}
.d-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.d-row:last-child{border-bottom:none}.d-row:hover{opacity:.75}
.d-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.d-t{font-size:13px;font-weight:600}.d-s{font-size:11px;color:var(--tx3);margin-top:2px}
/* CARDS */
.card-list{display:flex;flex-direction:column;gap:7px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);padding:13px 14px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.card:hover{border-color:var(--bd2);box-shadow:var(--sh2);transform:translateY(-1px)}
.card.sel{border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,110,246,.1)}
.card.sel.hs{border-color:var(--pu);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.card.sel.act{border-color:var(--tl);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.card.ov{border-left:3px solid var(--rd)}.card.ds{border-left:3px solid var(--am)}
.c-head{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px}
.av{width:34px;height:34px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.c-t{font-size:14px;font-weight:700;line-height:1.3}.c-s{font-size:12px;color:var(--tx2);margin-top:2px}
.c-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px}
.c-act{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-gn{background:var(--gn-l);color:var(--gn)}.b-bl{background:var(--bl-l);color:var(--bl)}
.b-am{background:var(--am-l);color:var(--am)}.b-rd{background:var(--rd-l);color:var(--rd)}
.b-pu{background:var(--pu-l);color:var(--pu)}.b-tl{background:var(--tl-l);color:var(--tl)}
.b-gr{background:var(--s2);color:var(--tx3)}
.chip{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bl-m);background:var(--bl-l);color:var(--bl)}
.chip:hover{background:var(--bl-m)}.chip.hs{border-color:var(--pu-m);background:var(--pu-l);color:var(--pu)}.chip.hs:hover{background:var(--pu-m)}
/* DETAIL PANE */
.dp-sticky{position:sticky;top:0;background:var(--sf);z-index:10;border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:flex-start;gap:7px}
.dp-hc{flex:1;min-width:0}.dp-t{font-size:15px;font-weight:800;line-height:1.3}.dp-s{font-size:12px;color:var(--tx2);margin-top:3px}
.dp-cl{width:28px;height:28px;border-radius:var(--r8);border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:15px;flex-shrink:0}
.dp-cl:hover{background:var(--s2)}
.dps{padding:12px 16px;border-bottom:1px solid var(--bd)}.dps:last-child{border-bottom:none}
.dps-t{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.dpf{margin-bottom:8px}.dpf-l{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.dpf-v{font-size:13px;color:var(--tx);line-height:1.5}
.dp-g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:8px}
.dp-lnk{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r8);border:1px solid var(--bd);cursor:pointer;transition:all .15s;margin-bottom:4px}
.dp-lnk:hover{background:var(--s2)}.dp-lnk-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dp-lnk-n{font-size:12px;font-weight:700}.dp-lnk-s{font-size:11px;color:var(--tx2);margin-top:1px}
.dp-em{font-size:12px;color:var(--tx3);font-style:italic}
/* WIEDERVORLAGE */
.wv-r{color:var(--rd);font-weight:700}.wv-a{color:var(--am);font-weight:700}.wv-g{color:var(--gn)}.wv-n{color:var(--tx3)}
/* CHRONIK */
.chr-i{border:1px solid var(--bd);border-radius:var(--r8);padding:9px 12px;margin-bottom:6px;background:var(--s2)}
.chr-m{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.chr-d{font-size:11px;font-weight:700;color:var(--tx3)}.chr-w{font-size:11px;color:var(--tx2)}
.chr-t{font-size:12px;color:var(--tx);line-height:1.5}
.chr-form{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
.chr-form input,.chr-form textarea{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r8);font-size:12px;font-family:inherit;outline:none;width:100%}
.chr-form textarea{min-height:52px;resize:vertical}
/* PING */
.ping-i{background:var(--am-l);border:1px solid var(--am-m);border-radius:var(--r8);padding:9px 11px;margin-bottom:5px}
.ping-w{font-size:12px;font-weight:700}.ping-m{font-size:12px;color:var(--tx2);margin-top:2px;line-height:1.4}
.ping-d{font-size:10px;color:var(--tx3);margin-top:4px;font-weight:600}
.ping-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;border:1px solid var(--am-m);background:var(--am-l);color:var(--am);font-size:11px;font-weight:700;cursor:pointer}
.ping-btn:hover{background:var(--am-m)}
/* DOC LINKS */
.doc-i{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r8);margin-bottom:5px;background:var(--s2)}
.doc-i a{font-size:12px;font-weight:600;color:var(--bl);text-decoration:none;flex:1}.doc-i a:hover{text-decoration:underline}
.doc-d{font-size:11px;color:var(--tx3)}
/* MATCH */
.match-i{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r8);margin-bottom:5px;cursor:pointer;background:var(--sf)}
.match-i:hover{border-color:var(--bl-m);background:var(--bl-l)}
.match-sc{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
/* STATUS HIST */
.sh-i{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px}
.sh-d{color:var(--tx3);width:80px;flex-shrink:0}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,17,23,.5);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--sf);border-radius:var(--r16);width:620px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3)}
.m-hdr{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.m-t{font-size:16px;font-weight:800}
.m-cl{width:28px;height:28px;border-radius:var(--r8);border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2)}
.m-cl:hover{background:var(--s2)}
.m-body{padding:18px 20px}
.m-foot{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:7px;border-top:1px solid var(--bd)}
.ff{margin-bottom:12px}
.ff label{display:block;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ff label .req{color:var(--rd);margin-left:2px}
.ff input,.ff select,.ff textarea{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r8);font-size:13px;background:var(--sf);color:var(--tx);font-family:inherit;outline:none;transition:border-color .15s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,110,246,.1)}
.ff textarea{resize:vertical;min-height:58px;line-height:1.5}
.ff .hint{font-size:11px;color:var(--tx3);margin-top:3px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.pk{border:1px solid var(--bd);border-radius:var(--r8);overflow:hidden;max-height:155px;overflow-y:auto}
.pk-i{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s}
.pk-i:last-child{border-bottom:none}.pk-i:hover{background:var(--s2)}.pk-i.pk-sel{background:var(--bl-l)}
.pk-i input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--bl);flex-shrink:0}
.pk-n{font-size:12px;font-weight:700}.pk-s{font-size:11px;color:var(--tx3)}
.req-note{background:var(--rd-l);border:1px solid var(--rd-m);border-radius:var(--r8);padding:8px 12px;font-size:12px;color:var(--rd);font-weight:600;margin-bottom:11px}
.sdiv{height:1px;background:var(--bd);margin:12px 0}
.sr{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.sr label{width:100px;font-size:12px;font-weight:700;color:var(--tx2);flex-shrink:0}
.sr input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r8);font-size:13px;font-family:inherit;outline:none}
.s-ok{background:var(--gn-l);color:var(--gn);padding:7px 11px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-top:7px}
.s-err{background:var(--rd-l);color:var(--rd);padding:7px 11px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-top:7px}
.es{text-align:center;padding:40px 20px;color:var(--tx3)}
.es-i{font-size:32px;margin-bottom:10px}.es-t{font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:5px}
a.ml{color:var(--bl);text-decoration:none;font-weight:600}.ml:hover{text-decoration:underline}
</style>
</head>
<body>
<!-- PIN SCREEN -->
<div id="ps">
  <div class="pw">
    <div class="pw-logo">Tonfunk Netzwerk</div>
    <div class="pw-sub">Hochschul-Kooperation Ermsleben</div>
    <input class="pw-in" type="password" id="pin-in" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')tryPin()">
    <div class="pw-err" id="pin-err"></div>
    <button class="pw-btn pw-p" onclick="tryPin()">Als Redakteur anmelden</button>
    <button class="pw-btn pw-s" onclick="startAs('reader')">Lesemodus öffnen</button>
  </div>
</div>
<!-- APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh">
  <div class="hdr">
    <div class="hdr-br">Tonfunk Netzwerk</div>
    <div class="hdr-sp"></div>
    <div class="hdr-loc">📍 Ermsleben · Harz</div>
    <div class="gsr" style="margin:0 8px">
      <span class="gsr-i">🔍</span>

  D.tft.forEach(t=>{if(Object.values(t).join(' ').toLowerCase().includes(ql))hits.push({ty:'tt',ico:'💡',n:t.tit,s:t.typ,id:t.id})});
  D.hst.forEach(t=>{if(Object.values(t).join(' ').toLowerCase().includes(ql))hits.push({ty:'ht',ico:'🎓',n:t.hs+' – '+t.typ,s:t.fb,id:t.id})});
  D.acts.forEach(a=>{if(Object.values(a).join(' ').toLowerCase().includes(ql))hits.push({ty:'ac',ico:'🔄',n:a.tit,s:a.typ,id:a.id})});
  if(!hits.length){r.innerHTML='<div style="padding:14px 12px;font-size:13px;color:var(--tx3);text-align:center">Keine Treffer</div>';r.classList.add('show');return}
  const grp={tc:'Tonfunk-Kontakte',hc:'Netzwerk-Kontakte',tt:'Themen Tonfunk',ht:'Themen Netzwerk',ac:'Aktivitäten'};
  let html='';
  Object.keys(grp).forEach(t=>{const g=hits.filter(h=>h.ty===t);if(!g.length)return;html+=`<div class="gsr-grp">${grp[t]}</div>`;g.slice(0,4).forEach(h=>{html+=`<div class="gsr-row" onclick="gsrGo('${h.ty}','${h.id}')"><span style="font-size:15px">${h.ico}</span><div><div class="gsr-nm">${e(h.n)}</div><div class="gsr-sb">${e(h.s||'')}</div></div></div>`});});
  r.innerHTML=html;r.classList.add('show');
}

${rows.length?`<div class="card-list">${rows.map(r=>`<div class="card${SEL===r.id?' sel act':''}${r.wv&&wvCls(r.wv)==='wv-r'?' ov':r.wv&&wvCls(r.wv)==='wv-a'?' ds':''}" onclick="selItem('ac','${r.id}')"><div class="c-head"><div style="flex:1;min-width:0"><div class="c-t">${e(r.tit)}</div><div class="c-s">${e(r.typ||'')}${r.zeit?' · '+e(r.zeit):''}</div>${r.ns?`<div class="c-s" style="color:var(--rd);font-size:11px;margin-top:2px">→ ${e(r.ns)}</div>`:''}</div><div class="c-act" onclick="event.stopPropagation()">${isEd()?`<button class="btn b-sm" onclick="openActF('${r.id}',null)">✎</button><button class="btn b-sm b-d" onclick="delI('acts','${r.id}')">×</button>`:''}<button class="btn b-sm" style="color:var(--am)" onclick="openPing('ac','${r.id}')">📌</button></div></div><div class="c-foot">${bdg(r.status)}${bP(r.prio)}${r.wv?`<span class="${wvCls(r.wv)}" style="font-size:11px">${wvLbl(r.wv)}</span>`:''}${(r.tids||[]).map(id=>`<span class="chip" onclick="event.stopPropagation();selItem('tc','${id}')">${e(cN(id))}</span>`).join('')}${(r.hids||[]).map(id=>`<span class="chip hs" onclick="event.stopPropagation();selItem('hc','${id}')">${e(cN(id))}</span>`).join('')}${gPings('ac',r.id).length?`<span class="badge b-am">📌 ${gPings('ac',r.id).length}</span>`:''}${gChron(r.id).length?`<span class="badge b-tl">📋 ${gChron(r.id).length}</span>`:''}</div></div>`).join('')}</div>`:`<div class="es"><div class="es-i">🔄</div><div class="es-t">Keine Aktivitäten gefunden</div></div>`}`;
}

// SELECT + DETAIL
function selItem(ty,id){
  SEL=id;document.getElementById('dc').classList.add('show');
  if(ty==='tc')dTfC(id);else if(ty==='hc')dHsC(id);
  else if(ty==='tt')dTfT(id);else if(ty==='ht')dHsT(id);
  else if(ty==='ac')dAct(id);
  if(ty==='tc'&&(MAIN!=='tf'||SUB!=='a')){setMain('tf');setSub('a',false);}
  if(ty==='hc'&&(MAIN!=='hs'||SUB!=='a')){setMain('hs');setSub('a',false);}
  if(ty==='tt'&&(MAIN!=='tf'||SUB!=='b')){setMain('tf');setSub('b',false);}
  if(ty==='ht'&&(MAIN!=='hs'||SUB!=='b')){setMain('hs');setSub('b',false);}
  if(ty==='ac'&&MAIN!=='ac')setMain('ac');
  render();
}
function closeDp(){SEL=null;document.getElementById('dc').classList.remove('show');render()}

function dpH(title,sub,editFn,vcFn){
  return`<div class="dp-sticky"><div class="dp-hc"><div class="dp-t">${e(title)}</div>${sub?`<div class="dp-s">${e(sub)}</div>`:''}</div>${vcFn?`<button class="hbtn" onclick="${vcFn}" title="vCard">📇</button>`:''} ${isEd()&&editFn?`<button class="hbtn" onclick="${editFn}" title="Bearbeiten">✎</button>`:''}<button class="dp-cl" onclick="closeDp()">✕</button></div>`;
}
function pingsSec(t,i){
  const ps=gPings(t,i);
  return`<div class="dps"><div class="dps-t">📌 Pings (${ps.length})</div>${ps.map(p=>`<div class="ping-i"><div class="ping-w">${e(p.name)}</div><div class="ping-m">${e(p.text)}</div><div class="ping-d">${e(p.datum)}</div></div>`).join('')}<button class="ping-btn" onclick="openPing('${t}','${i}')">+ Ping</button></div>`;
}
function dokSec(ent,id,col){
  const lks=(ent.dok||[]);
  if(!isEd()&&!lks.length)return'';
  return`<div class="dps"><div class="dps-t">📎 Dokumente / Links (${lks.length})</div>${lks.map((d,i)=>`<div class="doc-i"><a href="${e(d.url)}" target="_blank">${e(d.lbl||d.url)}</a><span class="doc-d">${e(d.desc||'')}</span>${isEd()?`<button class="btn b-sm b-d" onclick="rmDoc('${col}','${id}',${i})">×</button>`:''}</div>`).join('')}${isEd()?`<button class="btn b-sm" onclick="addDoc('${col}','${id}')">+ Link</button>`:''}</div>`;
}
function shSec(aid){
  const h=(D.chron||[]).filter(c=>c.aid===aid&&c.ty==='status');
  if(!h.length)return'';
  return`<div class="dps"><div class="dps-t">📊 Statushistorie</div>${h.map(x=>`<div class="sh-i"><span class="sh-d">${e(x.dt)}</span><span>${e(x.txt)}</span></div>`).join('')}</div>`;
}
function lnk(n,s,col,oc){return`<div class="dp-lnk" onclick="${oc}"><div class="dp-lnk-d" style="background:${col}"></div><div><div class="dp-lnk-n">${e(n)}</div>${s?`<div class="dp-lnk-s">${e(s)}</div>`:''}</div></div>`}

// DETAIL: TF CONTACT
function dTfC(id){
  const c=D.tfc.find(x=>x.id===id);if(!c)return;
  const themes=D.tft.filter(t=>(t.tids||[]).includes(id));
  const acts=D.acts.filter(a=>(a.tids||[]).includes(id));
  document.getElementById('dc').innerHTML=dpH(c.name,`${c.funk||''}${c.abt?' · '+c.abt:''}`,`openTfCF('${id}')`,`expVCard('${id}')`)
  +`<div class="dps"><div class="dp-g2"><div class="dpf"><div class="dpf-l">Status</div><div class="dpf-v">${bdg(c.status)}</div></div><div class="dpf"><div class="dpf-l">Abteilung</div><div class="dpf-v">${e(c.abt||'–')}</div></div></div><div class="dpf"><div class="dpf-l">E-Mail</div><div class="dpf-v">${c.email?`<a class="ml" href="mailto:${e(c.email)}">${e(c.email)}</a>`:'–'}</div></div><div class="dpf"><div class="dpf-l">Telefon</div><div class="dpf-v">${c.tel?`<a class="ml" href="tel:${e(c.tel.replace(/\s/g,''))}">${e(c.tel)}</a>`:'–'}</div></div>${c.wv?`<div class="dpf"><div class="dpf-l">Wiedervorlage</div><div class="dpf-v ${wvCls(c.wv)}">${wvLbl(c.wv)}</div></div>`:''}</div>`
  +(c.notiz?`<div class="dps"><div class="dps-t">Notizen</div><div class="dpf-v" style="font-size:13px;line-height:1.6;color:var(--tx2)">${e(c.notiz)}</div></div>`:'')
  +`<div class="dps"><div class="dps-t">Verknüpfte Themen (${themes.length})</div>${themes.map(t=>lnk(t.tit,t.typ,'var(--bl)',`selItem('tt','${t.id}')`)).join('')||`<div class="dp-em">Keine</div>`}</div>`
  +`<div class="dps"><div class="dps-t">Verknüpfte Aktivitäten (${acts.length})</div>${acts.map(a=>lnk(a.tit,a.typ,'var(--tl)',`selItem('ac','${a.id}')`)).join('')||`<div class="dp-em">Keine</div>`}</div>`
  +pingsSec('tc',id);
}

// DETAIL: HS CONTACT
function dHsC(id){
  const c=D.hsc.find(x=>x.id===id);if(!c)return;
  const themes=[...D.tft.filter(t=>(t.hids||[]).includes(id)),...D.hst.filter(t=>(t.aids||[]).includes(id))];
  const acts=D.acts.filter(a=>(a.hids||[]).includes(id));
  document.getElementById('dc').innerHTML=dpH(c.name,`${c.rolle||''} · ${c.inst}`,`openHsCF('${id}')`,`expVCard('${id}')`)
  +`<div class="dps"><div class="dp-g2"><div class="dpf"><div class="dpf-l">Status</div><div class="dpf-v">${bdg(c.status)}</div></div><div class="dpf"><div class="dpf-l">Fachbereich</div><div class="dpf-v" style="font-size:12px">${e(c.fb||'–')}</div></div></div><div class="dpf"><div class="dpf-l">E-Mail</div><div class="dpf-v">${c.email?`<a class="ml" href="mailto:${e(c.email)}">${e(c.email)}</a>`:'–'}</div></div><div class="dpf"><div class="dpf-l">Telefon</div><div class="dpf-v">${c.tel?`<a class="ml" href="tel:${e(c.tel.replace(/\s/g,''))}">${e(c.tel)}</a>`:'–'}</div></div>${c.adr?`<div class="dpf"><div class="dpf-l">Adresse</div><div class="dpf-v" style="font-size:12px;line-height:1.5">${e(c.adr)}</div></div>`:''} ${c.wv?`<div class="dpf"><div class="dpf-l">Wiedervorlage</div><div class="dpf-v ${wvCls(c.wv)}">${wvLbl(c.wv)}</div></div>`:''}</div>`
  +(c.notiz?`<div class="dps"><div class="dps-t">Notizen</div><div class="dpf-v" style="font-size:13px;line-height:1.6;color:var(--tx2)">${e(c.notiz)}</div></div>`:'')
  +`<div class="dps"><div class="dps-t">Verknüpfte Themen (${themes.length})</div>${themes.map(t=>lnk(t.tit||t.hs,t.typ||t.fb,'var(--pu)',`selItem('${t.hs?'ht':'tt'}','${t.id}')`)).join('')||`<div class="dp-em">Keine</div>`}</div>`
  +`<div class="dps"><div class="dps-t">Verknüpfte Aktivitäten (${acts.length})</div>${acts.map(a=>lnk(a.tit,a.typ,'var(--tl)',`selItem('ac','${a.id}')`)).join('')||`<div class="dp-em">Keine</div>`}</div>`
  +dokSec(c,id,'hsc')+pingsSec('hc',id);

// DETAIL: TF THEME
function dTfT(id){
  const t=D.tft.find(x=>x.id===id);if(!t)return;
  const acts=D.acts.filter(a=>(a.thids||[]).includes(id));
  const matches=getMatches(t);
  document.getElementById('dc').innerHTML=dpH(t.tit,`${t.typ||''} · ${t.fach||''}`,`openTfTF('${id}')`)
  +`<div class="dps"><div class="dp-g2"><div class="dpf"><div class="dpf-l">Priorität</div><div class="dpf-v">${bP(t.prio)}</div></div><div class="dpf"><div class="dpf-l">Status</div><div class="dpf-v">${bdg(t.status)}</div></div></div><div class="dpf"><div class="dpf-l">Zeitraum</div><div class="dpf-v" style="font-size:12px">${e(t.zeit||'–')}</div></div></div>`
  +(t.desc?`<div class="dps"><div class="dps-t">Beschreibung</div><div class="dpf-v" style="font-size:12px;line-height:1.7;white-space:pre-wrap">${e(t.desc)}</div></div>`:'')
  +`<div class="dps"><div class="dps-t">Tonfunk-Ansprechpartner</div>${(t.tids||[]).map(i=>{const c=tfC(i);return c?lnk(c.name,c.funk,'var(--bl)',`selItem('tc','${i}')`):'';}).join('')||`<div class="dp-em" style="color:var(--rd)">⚠ Kein Ansprechpartner</div>`}</div>`
  +`<div class="dps"><div class="dps-t">Aktivitäten (${acts.length})</div>${acts.map(a=>lnk(a.tit,a.typ,'var(--tl)',`selItem('ac','${a.id}')`)).join('')||`<div class="dp-em">Noch keine – <span style="color:var(--gn);cursor:pointer;font-weight:600" onclick="promote('${id}','tf')">→ jetzt anlegen</span></div>`}</div>`
  +`<div class="dps"><div class="dps-t">🤝 Passende Netzwerk-Kontakte</div>${matches.length?matches.map(({c,s})=>`<div class="match-i" onclick="selItem('hc','${c.id}')"><div class="match-sc" style="background:${s>=7?'var(--gn-l)':s>=4?'var(--am-l)':'var(--s2)'};color:${s>=7?'var(--gn)':s>=4?'var(--am)':'var(--tx3)'}">${s}</div><div><div class="dp-lnk-n">${e(c.name)}</div><div class="dp-lnk-s">${e(c.inst)} · ${e(c.fb||'')}</div></div></div>`).join(''):`<div class="dp-em">Keine Treffer</div>`}</div>`
  +dokSec(t,id,'tft')+pingsSec('tt',id);
}

// DETAIL: HS THEME
function dHsT(id){
  const t=D.hst.find(x=>x.id===id);if(!t)return;
  document.getElementById('dc').innerHTML=dpH(t.hs,t.typ,`openHsTF('${id}')`)
  +`<div class="dps"><div class="dp-g2"><div class="dpf"><div class="dpf-l">Priorität</div><div class="dpf-v">${bP(t.prio)}</div></div><div class="dpf"><div class="dpf-l">Status</div><div class="dpf-v">${bdg(t.status)}</div></div></div><div class="dpf"><div class="dpf-l">Fachbereich</div><div class="dpf-v" style="font-size:12px">${e(t.fb||'–')}</div></div><div class="dpf"><div class="dpf-l">Beschreibung</div><div class="dpf-v" style="font-size:12px;line-height:1.6">${e(t.desc||'–')}</div></div>${t.notiz?`<div class="dpf"><div class="dpf-l">Notiz</div><div class="dpf-v" style="font-size:12px;font-style:italic;color:var(--tx2)">${e(t.notiz)}</div></div>`:''}</div>`
  +`<div class="dps"><div class="dps-t">Ansprechpartner</div>${(t.aids||[]).map(i=>{const c=hsC(i);return c?lnk(c.name,`${c.rolle} · ${c.inst}`,'var(--pu)',`selItem('hc','${i}')`):'';}).join('')||`<div class="dp-em">Kein Ansprechpartner</div>`}</div>`
  +dokSec(t,id,'hst')+pingsSec('ht',id);
}

// DETAIL: ACTIVITY
function dAct(id){
  const a=D.acts.find(x=>x.id===id);if(!a)return;
  const themes=(a.thids||[]).map(gT).filter(Boolean);
  const chron=gChron(id).filter(c=>c.ty!=='status');
  document.getElementById('dc').innerHTML=dpH(a.tit,`${a.typ||''} · ${a.zeit||''}`,`openActF('${id}',null)`)
  +`<div class="dps"><div class="dp-g2"><div class="dpf"><div class="dpf-l">Priorität</div><div class="dpf-v">${bP(a.prio)}</div></div><div class="dpf"><div class="dpf-l">Status</div><div class="dpf-v">${bdg(a.status)}</div></div></div>${a.wv?`<div class="dpf"><div class="dpf-l">Wiedervorlage</div><div class="dpf-v ${wvCls(a.wv)}">${wvLbl(a.wv)}</div></div>`:''}<div class="dpf"><div class="dpf-l">Letzter Kontakt</div><div class="dpf-v" style="font-size:12px">${e(a.lk||'–')}</div></div>${a.ns?`<div class="dpf"><div class="dpf-l">Nächster Schritt</div><div class="dpf-v" style="color:var(--rd);font-weight:600">${e(a.ns)}</div></div>`:''} ${a.notiz?`<div class="dpf"><div class="dpf-l">Notiz</div><div class="dpf-v" style="font-size:12px;color:var(--tx2);line-height:1.5">${e(a.notiz)}</div></div>`:''}</div>`
  +`<div class="dps"><div class="dps-t">Tonfunk-Kontakte *</div>${(a.tids||[]).length?(a.tids||[]).map(i=>{const c=tfC(i);return c?lnk(c.name,c.funk+(c.email?' · '+c.email:''),'var(--bl)',`selItem('tc','${i}')`):'';}).join(''):`<div class="dp-em" style="color:var(--rd)">⚠ Kein Tonfunk-Kontakt</div>`}</div>`
  +`<div class="dps"><div class="dps-t">Externe Kontakte *</div>${(a.hids||[]).length?(a.hids||[]).map(i=>{const c=hsC(i);return c?lnk(c.name,c.inst+(c.email?' · '+c.email:''),'var(--pu)',`selItem('hc','${i}')`):'';}).join(''):`<div class="dp-em" style="color:var(--rd)">⚠ Kein externer Kontakt</div>`}</div>`
  +(themes.length?`<div class="dps"><div class="dps-t">Verknüpfte Themen</div>${themes.map(t=>lnk(t.tit||t.hs,t.typ||t.fb,'var(--am)',`selItem('${t.hs?'ht':'tt'}','${t.id}')`)).join('')}</div>`:'')
  +`<div class="dps"><div class="dps-t">📋 Aktivitäten-Chronik (${chron.length})</div>${chron.map(c=>`<div class="chr-i"><div class="chr-m"><span class="chr-d">${e(c.dt)}</span><span class="chr-w">${e(c.wer)}</span></div><div class="chr-t">${e(c.txt)}</div></div>`).join('')||`<div class="dp-em">Noch keine Einträge</div>`}${isEd()?`<div class="chr-form"><input id="chr-wer" placeholder="Dein Name"><textarea id="chr-txt" placeholder="Was wurde besprochen?" rows="3"></textarea><button class="btn b-sm b-p" onclick="addChron('${id}')">Eintrag hinzufügen</button></div>`:`<button class="ping-btn" style="margin-top:8px" onclick="openChrRdr('${id}')">+ Eintrag als Leser</button>`}</div>`
  +shSec(id)+dokSec(a,id,'acts')+pingsSec('ac',id);
}

function addChron(aid){
  const wer=document.getElementById('chr-wer').value.trim();
  const txt=document.getElementById('chr-txt').value.trim();
  if(!wer||!txt)return alert('Name und Text erforderlich');
  if(!D.chron)D.chron=[];
  D.chron.push({id:uid(),aid,dt:today(),wer,txt,ty:'manual'});
  sched();dAct(aid);
}
function openChrRdr(aid){
  openModal(`<div class="m-hdr"><div class="m-t">📋 Chronik-Eintrag</div><button class="m-cl" onclick="closeModal()">✕</button></div><div class="m-body"><div class="ff"><label>Dein Name <span class="req">*</span></label><input id="cr-w" placeholder="Vorname Nachname"></div><div class="ff"><label>Was wurde besprochen? <span class="req">*</span></label><textarea id="cr-t" style="min-height:80px"></textarea></div></div><div class="m-foot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn b-p" onclick="saveChrRdr('${aid}')">Speichern</button></div>`);
}
function saveChrRdr(aid){
  const wer=document.getElementById('cr-w').value.trim();const txt=document.getElementById('cr-t').value.trim();
  if(!wer||!txt)return alert('Alle Felder erforderlich');
  if(!D.chron)D.chron=[];
  D.chron.push({id:uid(),aid,dt:today(),wer,txt,ty:'manual'});
  sched();closeModal();dAct(aid);
}

// DOC LINKS
function addDoc(col,id){
  openModal(`<div class="m-hdr"><div class="m-t">📎 Link / Dokument hinzufügen</div><button class="m-cl" onclick="closeModal()">✕</button></div><div class="m-body"><div class="ff"><label>URL <span class="req">*</span></label><input id="dl-url" placeholder="https://…"></div><div class="ff"><label>Bezeichnung</label><input id="dl-lbl" placeholder="z.B. Aufgabenstellung LWL-Analyzer"></div><div class="ff"><label>Beschreibung</label><input id="dl-desc" placeholder="z.B. PDF, Stand Mai 2025"></div></div><div class="m-foot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn b-p" onclick="saveDoc('${col}','${id}')">Hinzufügen</button></div>`);
}
function saveDoc(col,id){
  const url=document.getElementById('dl-url').value.trim();if(!url)return alert('URL erforderlich');
  const lbl=document.getElementById('dl-lbl').value.trim();const desc=document.getElementById('dl-desc').value.trim();
  const item=D[col].find(x=>x.id===id);if(!item)return;
  if(!item.dok)item.dok=[];
  item.dok.push({url,lbl,desc});
  sched();closeModal();
  const ty={tfc:'tc',hsc:'hc',tft:'tt',hst:'ht',acts:'ac'}[col]||'ac';
  selItem(ty,id);
}
function rmDoc(col,id,idx){
  if(!confirm('Link entfernen?'))return;
  const item=D[col].find(x=>x.id===id);if(!item||!item.dok)return;
  item.dok.splice(idx,1);sched();
  const ty={tfc:'tc',hsc:'hc',tft:'tt',hst:'ht',acts:'ac'}[col]||'ac';
  selItem(ty,id);
}

  openModal(`<div class="m-hdr"><div class="m-t">${id?'Kontakt bearbeiten':'Neuer Tonfunk-Kontakt'}</div><button class="m-cl" onclick="closeModal()">✕</button></div>
  <div class="m-body">

function expVCard(id){
  const c=tfC(id)||hsC(id);if(!c)return;
  const org=c.inst||'Tonfunk GmbH Ermsleben';const dept=c.abt||c.fb||'';
  const lines=['BEGIN:VCARD','VERSION:3.0','FN:'+c.name,'N:'+(c.name.split(' ').slice(1).join(' '))+';'+(c.name.split(' ')[0])+';;;','ORG:'+org+(dept?';'+dept:''),c.funk||c.rolle?'TITLE:'+(c.funk||c.rolle):'',c.email?'EMAIL;TYPE=WORK:'+c.email:'',c.tel?'TEL;TYPE=WORK:'+c.tel:'',c.adr?'ADR;TYPE=WORK:;;'+c.adr+';;;;':'',c.notiz?'NOTE:'+c.notiz.replace(/\n/g,'\\n'):'','END:VCARD'].filter(Boolean).join('\r\n');
  dlF(lines,c.name.replace(/\s+/g,'_')+'.vcf','text/vcard');
}
function expCSV(ty){
  const data=ty==='tf'?D.tfc:D.hsc;const isTf=ty==='tf';
  const hdr=isTf?['Name','Funktion','Abteilung','E-Mail','Telefon','Status','Notiz']:['Name','Rolle','Institution','Fachbereich','E-Mail','Telefon','Adresse','Status','Notiz'];
  const rows=data.map(c=>isTf?[c.name,c.funk||'',c.abt||'',c.email||'',c.tel||'',c.status||'',c.notiz||'']:[c.name,c.rolle||'',c.inst||'',c.fb||'',c.email||'',c.tel||'',c.adr||'',c.status||'',c.notiz||'']);
  dlF('\uFEFF'+[hdr,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\r\n'),'Kontakte_'+(isTf?'Tonfunk':'Netzwerk')+'_'+today().replace(/\./g,'-')+'.csv','text/csv;charset=utf-8');
}
function dlF(c,f,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=f;a.click();URL.revokeObjectURL(a.href)}
function openImp(){
  openModal(`<div class="m-hdr"><div class="m-t">📥 Kontakte importieren</div><button class="m-cl" onclick="closeModal()">✕</button></div><div class="m-body"><div style="background:var(--s2);border-radius:var(--r8);padding:11px 13px;font-size:11px;font-family:monospace;color:var(--tx2);margin-bottom:14px;line-height:1.8"><strong>Tonfunk CSV:</strong> Name;Funktion;Abteilung;E-Mail;Telefon;Status;Notiz<br><strong>Netzwerk CSV:</strong> Name;Rolle;Institution;Fachbereich;E-Mail;Telefon;Adresse;Status;Notiz</div><div class="ff"><label>Zielgruppe</label><select id="imp-t"><option value="tf">Tonfunk-Kontakte</option><option value="hs">Netzwerk-Kontakte</option></select></div><div class="ff"><label>Datei (.vcf oder .csv)</label><input type="file" id="imp-f" accept=".vcf,.csv" style="padding:7px;border:1px solid var(--bd);border-radius:var(--r8);width:100%;font-size:13px"></div><div id="imp-prev" style="margin-top:8px"></div></div><div class="m-foot"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn b-p" onclick="runImp()">Importieren</button></div>`);
  document.getElementById('imp-f').addEventListener('change',prevImp);
}
function prevImp(){
  const file=document.getElementById('imp-f').files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const txt=ev.target.result;const tgt=document.getElementById('imp-t').value;
    const parsed=file.name.toLowerCase().endsWith('.vcf')?parseVCF(txt):parseCSV(txt,tgt);
    const prev=document.getElementById('imp-prev');
    if(!parsed.length){prev.innerHTML='<div style="color:var(--rd);font-size:12px">⚠ Keine Kontakte erkannt.</div>';return}
    prev.innerHTML=`<div style="background:var(--gn-l);border:1px solid var(--gn-m);border-radius:var(--r8);padding:9px 13px;font-size:12px;color:var(--gn);font-weight:600">✓ ${parsed.length} Kontakt(e) erkannt</div><div style="margin-top:7px;max-height:140px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r8)">${parsed.map(c=>`<div style="padding:6px 11px;border-bottom:1px solid var(--bd);font-size:12px"><strong>${e(c.name||'–')}</strong><span style="color:var(--tx3);margin-left:8px">${e(c.email||c.inst||c.abt||'')}</span></div>`).join('')}</div>`;
    prev.dataset.parsed=JSON.stringify(parsed);
  };rd.readAsText(file,'UTF-8');
}
function parseVCF(txt){return txt.split(/BEGIN:VCARD/i).slice(1).map(card=>{const g=k=>{const m=card.match(new RegExp(k+'[^:]*:([^\r\n]+)','i'));return m?m[1].trim():''};return{name:g('FN')||g('N').replace(/;+/g,' ').trim(),funk:g('TITLE'),abt:'',inst:g('ORG').replace(/;/g,' ').trim(),fb:'',email:g('EMAIL'),tel:g('TEL'),adr:g('ADR').replace(/;/g,', ').replace(/^,+|,+$/g,'').trim(),notiz:g('NOTE').replace(/\\n/g,'\n'),status:'Offen',rolle:'Sonstige',dok:[]};}).filter(c=>c.name)}
function parseCSV(txt,tgt){return txt.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith('"Name"')&&!l.startsWith('Name')).map(line=>{const c=line.split(';').map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"').trim());return tgt==='tf'?{name:c[0]||'',funk:c[1]||'',abt:c[2]||'',email:c[3]||'',tel:c[4]||'',status:c[5]||'Offen',notiz:c[6]||'',dok:[]}:{name:c[0]||'',rolle:c[1]||'Sonstige',inst:c[2]||'',fb:c[3]||'',email:c[4]||'',tel:c[5]||'',adr:c[6]||'',status:c[7]||'Offen',notiz:c[8]||'',dok:[]};}).filter(c=>c.name)}
function runImp(){
  const prev=document.getElementById('imp-prev');if(!prev?.dataset.parsed){alert('Bitte Datei wählen');return}
  const tgt=document.getElementById('imp-t').value;const parsed=JSON.parse(prev.dataset.parsed);let added=0;
  parsed.forEach(c=>{const obj={...c,id:uid()};tgt==='tf'?D.tfc.push(obj):D.hsc.push(obj);added++;});
  sched();closeModal();tgt==='tf'?(setMain('tf'),setSub('a',false)):(setMain('hs'),setSub('a',false));render();
  setTimeout(()=>alert(`✓ ${added} Kontakt(e) importiert.`),200);
}

function submitContact(){
  const werSel=document.getElementById('cs-wer').value;
  const wer=werSel==='__andere__'?document.getElementById('cs-wer-txt').value.trim():werSel;
  if(!wer)return alert('Bitte deinen Namen auswählen oder eingeben');
  const name=document.getElementById('cs-name').value.trim();
  if(!name)return alert('Bitte einen Kontaktnamen eingeben');
  if(!D.inbox)D.inbox=[];
  D.inbox.push({id:uid(),kind:'contact',wer,name,rolle:document.getElementById('cs-rolle').value,inst:document.getElementById('cs-inst').value.trim(),fb:document.getElementById('cs-fb').value.trim(),email:document.getElementById('cs-email').value.trim(),tel:document.getElementById('cs-tel').value.trim(),relevanz:document.getElementById('cs-rel').value.trim(),datum:today(),status:'neu'});
  sched();closeModal();
  const conf=document.createElement('div');
  conf.style.cssText='position:fixed;bottom:100px;right:24px;background:#0891b2;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  conf.textContent='✓ Kontaktvorschlag eingereicht – danke!';
  document.body.appendChild(conf);setTimeout(()=>conf.remove(),3000);
}

function approveInbox(id){
  const it=D.inbox.find(x=>x.id===id);if(!it)return;
  D.tft.push({id:uid(),tit:it.tit,typ:it.typ||'Idee',fach:it.fach||'Sonstige',prio:it.prio||'Mittel',status:'Idee',tids:[],zeit:'offen',desc:it.desc||'',notiz:`Eingereicht von ${it.wer} am ${it.datum}`,dok:[]});
  D.inbox=D.inbox.filter(x=>x.id!==id);
  sched();setMain('tf');setSub('b',false);render();
  alert('✓ Idee in den Tonfunk-Themenspeicher übernommen.');
}

function approveContact(id){
  const it=D.inbox.find(x=>x.id===id);if(!it)return;
  D.hsc.push({id:uid(),name:it.name,rolle:it.rolle||'Sonstige',inst:it.inst||'',fb:it.fb||'',email:it.email||'',tel:it.tel||'',adr:'',wv:'',notiz:`Vorgeschlagen von ${it.wer} am ${it.datum}${it.relevanz?'. Relevanz: '+it.relevanz:''}`,status:'Offen',dok:[]});
  D.inbox=D.inbox.filter(x=>x.id!==id);
  sched();setMain('hs');setSub('a',false);render();
  alert('✓ Kontakt in den Netzwerk-Katalog übernommen.');
}

function rejectInbox(id){
  if(!confirm('Eintrag ablehnen und entfernen?'))return;
  D.inbox=D.inbox.filter(x=>x.id!==id);
  sched();render();
}

// BOOT
if(sessionStorage.getItem('tf_role'))startAs(sessionStorage.getItem('tf_role'));
</script>
